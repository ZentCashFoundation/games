<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Snake Game | Zent Cash Fun</title>
  <link rel="stylesheet" type="text/css" href="assets/vendor/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" type="text/css" href="assets/css/snake.css">
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
     <div class="container-fluid">
       <a class="navbar-brand" href="/"><img alt="snake-logo" loading="lazy" src="assets/img/snake.png" height="48"> <span class="logo-text">Snake</span></a>
       <button class="close-session-btn" onclick="closeSession()">Close Session</button>
    </div>
  </nav>

      <div id="auth">
          <h2 class="auth-title">Authentication</h2>
          <input id="email" placeholder="email">
          <input id="password" type="password" placeholder="password">
      <br>
      <div>
          <button class="register-btn" onclick="register()">Register</button>
          <button class="login-btn" onclick="login()">Login</button>
      </div>
  </div>
<button class="play" onclick="play()">Play Game</button>
  <h1>Snake 🐍</h1>
  <canvas id="game" width="600" height="600"></canvas>
  <div class="hud">
    <p>Puntuación: <span id="score">0</span></p>
    <p>Récord: <span id="highscore">0</span></p>
    <p>Controles: ⬅️ ➡️ ⬆️ ⬇️ | Enter = reiniciar</p>
  </div>
<div class="col-12 col-sm-12 col-md-12 col-lg-6">
  <div class="content-container-right">
    <div class="toplist">
        <h2 class="toplist-title">Top 10 Ranking List</h2>
          <div class="ranking-container">
            <table>
              <thead>
                <tr>
                  <th>Rank</th>
                  <th>Username</th>
                  <th>Score</th>
                </tr>
              </thead>
              <tbody id="ranking-body">                            
              </tbody>
            </table>
          </div>
    </div>
  </div>
  </div>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/snake.js"></script>

</body>
</html>
