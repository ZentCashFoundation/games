<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Snake Game</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: radial-gradient(circle at top, #1a1a1a, #000);
      color: white;
      font-family: 'Segoe UI', sans-serif;
      flex-direction: column;
    }

    h1 {
      margin-bottom: 10px;
      text-shadow: 0 0 10px lime;
    }

    canvas {
      background: #111;
      border: 3px solid #0f0;
      box-shadow: 0 0 20px #0f0;
      border-radius: 10px;
    }

    .hud {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <h1>Snake 🐍</h1>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="hud">
    <p>Puntuación: <span id="score">0</span></p>
    <p>Récord: <span id="highscore">0</span></p>
    <p>Controles: ⬅️ ➡️ ⬆️ ⬇️ | Enter = reiniciar</p>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highscoreEl = document.getElementById('highscore');

    const grid = 20;
    let count = 0;
    let gameOver = false;

    let score = 0;
    let highscore = localStorage.getItem('snakeHighscore') || 0;
    highscoreEl.textContent = highscore;

    let snake = {
      x: 160,
      y: 160,
      dx: grid,
      dy: 0,
      cells: [],
      maxCells: 4
    };

    let apple = {
      x: 320,
      y: 320
    };

    function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min)) + min;
    }

    function resetGame() {
      snake.x = 160;
      snake.y = 160;
      snake.cells = [];
      snake.maxCells = 4;
      snake.dx = grid;
      snake.dy = 0;

      score = 0;
      scoreEl.textContent = score;

      gameOver = false;
    }

    function drawRoundedRect(x, y, size, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(x, y, size - 1, size - 1, 6);
      ctx.fill();
    }

    function loop() {
      if (gameOver) return;

      requestAnimationFrame(loop);

      if (++count < 8) return;
      count = 0;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      snake.x += snake.dx;
      snake.y += snake.dy;

      // colisión paredes
      if (snake.x < 0 || snake.x >= canvas.width || snake.y < 0 || snake.y >= canvas.height) {
        if (!gameOver) {
          gameOver = true;
          alert('¡Game Over! Puntuación: ' + score);
        }
        return;
      }

      snake.cells.unshift({ x: snake.x, y: snake.y });

      if (snake.cells.length > snake.maxCells) {
        snake.cells.pop();
      }

      // manzana
      let gradient = ctx.createRadialGradient(
        apple.x + 10, apple.y + 10, 2,
        apple.x + 10, apple.y + 10, 10
      );
      gradient.addColorStop(0, '#ff8080');
      gradient.addColorStop(1, '#cc0000');

      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(apple.x + 10, apple.y + 10, 9, 0, Math.PI * 2);
      ctx.fill();

      // serpiente
      snake.cells.forEach(function(cell, index) {
        let color = index === 0 ? '#00ffcc' : '#00cc66';
        drawRoundedRect(cell.x, cell.y, grid, color);

        // comer
        if (cell.x === apple.x && cell.y === apple.y) {
          snake.maxCells++;
          score++;
          scoreEl.textContent = score;

          apple.x = getRandomInt(0, 20) * grid;
          apple.y = getRandomInt(0, 20) * grid;
        }

        // colisión cuerpo
        for (let i = index + 1; i < snake.cells.length; i++) {
          if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
            if (!gameOver) {
              gameOver = true;
              alert('¡Game Over! Puntuación: ' + score);
            }
          }
        }
      });
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && gameOver) {
        resetGame();
        loop();
        return;
      }

      if (gameOver) return;

      if (e.which === 37 && snake.dx === 0) {
        snake.dx = -grid;
        snake.dy = 0;
      } else if (e.which === 38 && snake.dy === 0) {
        snake.dy = -grid;
        snake.dx = 0;
      } else if (e.which === 39 && snake.dx === 0) {
        snake.dx = grid;
        snake.dy = 0;
      } else if (e.which === 40 && snake.dy === 0) {
        snake.dy = grid;
        snake.dx = 0;
      }
    });

    requestAnimationFrame(loop);
  </script>
</body>
</html>
