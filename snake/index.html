<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Snake Game | Zent Cash Fun</title>
  <link rel="stylesheet" type="text/css" href="assets/vendor/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" type="text/css" href="assets/css/snake.css">
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
     <div class="container-fluid">
       <a class="navbar-brand" href="/"><img alt="snake-logo" loading="lazy" src="assets/img/snake.png" height="48"> <span class="logo-text">Snake</span></a>
       <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
       </button>
       <div class="navbar-collapse" id="navbarNavDropdown">
          <p class="usergetbalance">Balance: <span id="balance">0.00</span></p>
          <button class="register-login-btn" onclick="window.location.href='auth.html'">Register / Login</button>
          <button class="close-session-btn" onclick="closeSession()">Close Session</button>
       </div>
    </div>
  </nav>
  <section class="container-games">  
    <div class="row">
      <div class="col-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-6">
        <div class="games-container">      
          <canvas id="game" width="600" height="600"></canvas>
          <div class="hud-container">
            <div class="hud">
              <h3>Score:</h3>
              <span id="score">0</span>
              <h3>Controls:</h3>
              <span>⬅️ ➡️ ⬆️ ⬇️</span>
              <p> A D W S</p>
            </div>
            <div class="hud">
              <button class="play" onclick="play()"><p>Play Game</p></button>
            </div>
          </div>  
        </div>  
      </div>
      <div class="col-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-6">
          <div class="deposit">
              <h2 class="deposit-title">Deposit</h2>
              <h5>Address</h5>
              <p><span id="address">...</span></p>
              <h5>Payment ID</h5>
              <p><span id="paymentid">...</span></p>
              <h5>Integrated Address</h5>
              <p><span id="integratedaddress">...</span></p>
          </div>
          <div class="toplist">
              <h2 class="toplist-title">Top 10 Ranking List</h2>
                <div class="ranking-container">
                  <table>
                    <thead>
                      <tr>
                        <th>Rank</th>
                        <th>Username</th>
                        <th>Score</th>
                      </tr>
                    </thead>
                    <tbody id="ranking-body">                            
                    </tbody>
                  </table>
                </div>
          </div>
      </div>
    </div>
  </section>
  <section class="footer">
    <div class="footer-copyright">     
      <p>Copyright &copy; <span id="currentyear">2026</span> Zent Cash Fun. All rights reserved.</p>
    </div>
  </section>
  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>   
  <script src="assets/js/api.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/snake.js"></script>
</body>
</html>
