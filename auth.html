<!DOCTYPE html>

<head>

  <title>Zent Cash Fun</title>
  <link rel="stylesheet" type="text/css" href="assets/vendor/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" type="text/css" href="assets/css/main.css">
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
	<nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
		<div class="container-fluid">
			<a class="navbar-brand" href="/"><img alt="Zent Cash Fun" loading="lazy" src="assets/img/zent-cash-fun.png" height="48"> <span class="logo-text">Zent Cash Fun</span></a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
			<div class="collapse navbar-collapse" id="navbarNavDropdown">

					<a class="nav-item" href="./">Home</a>
					<a class="nav-item userdashboard" href="dashboard.html">Dashboard</a>
				</div>
				<p class="usergetbalance">Balance: <span id="balance">0.00</span></p>

			</div>

			<h2 class="auth-title">Authentication</h2>
			<input id="email" placeholder="email">

		</div>
		</div>
	</section>		
	<section class="footer">
		<div class="footer-copyright">
		<audio id="background-music" autoplay loop>
			<source src="assets/song/background-music-two.mp3" type="audio/mpeg">
		</audio>	     
		<p>Copyright &copy; <span id="currentyear">2026</span> Zent Cash Fun. All rights reserved.</p>
		</div>
	</section>

	<script src="assets/js/api.js"></script>   
	<script src="assets/js/main.js"></script>
